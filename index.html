<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="オーダーの発動順と効果時間を組み立てられる、非公式の編成支援ツールです。"
    />
    <title>Order Composer</title>
    <link rel="stylesheet" href="./styles.css?v=20260621-5" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="./" aria-label="Order Composer ホーム">
          <span class="brand-mark" aria-hidden="true">OC</span>
          <span>
            <strong>ORDER COMPOSER</strong>
            <small>Battle sequence planner</small>
          </span>
        </a>

        <div class="header-actions">
          <button class="button button-ghost" id="save-button" type="button">
            <span aria-hidden="true">◇</span> 保存
          </button>
          <button class="button button-primary" id="share-button" type="button">
            <span aria-hidden="true">↗</span> 共有
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="catalog-panel" aria-labelledby="catalog-heading">
          <div class="section-heading">
            <div>
              <p class="eyebrow">ORDER LIBRARY</p>
              <h1 id="catalog-heading">オーダー一覧</h1>
            </div>
            <span class="count-badge" id="catalog-count"></span>
          </div>

          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input
              id="search-input"
              type="search"
              placeholder="名前・効果で検索"
              autocomplete="off"
            />
          </label>

          <div class="filter-row" id="filter-row" aria-label="カテゴリ絞り込み"></div>

          <div class="order-grid" id="order-grid"></div>
        </section>

        <section class="composer-panel" aria-labelledby="composer-heading">
          <div class="composer-topbar">
            <div>
              <p class="eyebrow">MY SEQUENCE</p>
              <h2 id="composer-heading">編成プラン</h2>
            </div>
            <button class="text-button" id="clear-button" type="button">すべて外す</button>
          </div>

          <div class="summary-card">
            <div class="summary-main">
              <span class="summary-label">残り時間</span>
              <strong id="remaining-time">15:00</strong>
            </div>
            <div class="summary-stat">
              <span>オーダー</span>
              <strong><span id="selected-count">0</span> / 8</strong>
            </div>
          </div>

          <div class="timeline-wrap">
            <div class="timeline-ruler" aria-hidden="true">
              <span>START</span>
              <span>01:00</span>
              <span>02:00</span>
              <span>03:00</span>
              <span>04:00</span>
            </div>
            <div
              class="sequence-list"
              id="sequence-list"
              aria-label="選択したオーダーの発動順"
            ></div>
          </div>

          <div class="composer-hint">
            <span aria-hidden="true">↕</span>
            スマホは左の番号を長押しして発動順を変更できます
          </div>
        </section>
      </main>

      <footer>
        非公式ファンツールの試作版です。ゲーム運営・権利者とは関係ありません。
      </footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <template id="order-card-template">
      <article class="order-card">
        <div class="order-card-accent"></div>
        <div class="order-icon" aria-hidden="true"></div>
        <div class="order-content">
          <div class="order-meta">
            <span class="type-pill"></span>
            <span class="order-duration"></span>
          </div>
          <h3></h3>
          <div class="order-footer">
            <button class="add-button" type="button" aria-label="編成に追加">＋</button>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js?v=20260621-5"></script>
  </body>
</html>
